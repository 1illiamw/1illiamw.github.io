<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William Alencar</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        
        <!-- Sua Foto Principal -->
        <div class="media-box">
            <img src="fotohome_720.png" alt="William Alencar" class="main-photo">
        </div>
        <br>
        <!-- Seus Links (Puro Minimalismo) -->
                <!-- PLAYER ARTESANAL: Texto puro para controlar o áudio -->
        <div class="player-artesanal">
            <!-- Substitua 'nome-do-seu-arquivo.mp3' pelo nome exato do arquivo que você subiu no GitHub -->
            <audio id="musica-bg" src="quintoandar_aumpassodoparaiso.mp3" onended="resetarPlayer()"></audio>
            <span id="botao-player" onclick="controlarAudio()">📡 listening now</span>
        </div>
        <div class="links-box">
            <a href="https://wliam.myportfolio.com/" target="_blank">🏝️ trabalhos</a>
            <a href="https://youtube.com/@wliam" target="_blank">🪰 yt</a>
            <a href="mailto:williamalencar@gmail.com">🏓 email</a>
        </div>
    </div>

    <!-- Script para alternar o Play/Pause e o texto do botão -->
    <script>
    function controlarAudio() {
        var audio = document.getElementById("musica-bg");
        var botao = document.getElementById("botao-player");
        
        if (audio.paused) {
            audio.play();
            botao.innerHTML = "⏸️ pause";
        } else {
            audio.pause();
            botao.innerHTML = "📡 listening now";
        }
    }
// Função automática que roda assim que o arquivo .mp3 termina de tocar
    function resetarPlayer() {
        botao.innerHTML = "📡 listening now";
    }
    </script>

</body>
</html>
